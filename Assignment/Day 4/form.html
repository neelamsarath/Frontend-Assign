<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<body>
    <h2> 1) Question 1 (Form)</h2>
    <form action="redirect.html" method="get">
        <label for="Name" >Name :</label>
        <input type="text" id="name" name="name"><br>
        <label for="ID no.">ID No :</label>
        <input type="number" id="idno" name="number">
    </form>

    <h2> 2) Question 2 (Input Types)</h2>
    <form action="redirect.html">
        <label for="Name" >Name :</label>
        <input type="text" id="name" name="name"><br>
        <label for="password">Password :</label>
        <input type="number" id="idno" name="password"><br> 
        <input type="submit" value="Login" >
    </form>

    <h2> 3) Question 3 (CheckBox)</h2>
    <h3> Radio buttons:</h3>
        <p>Gender:</p>
        <form>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label><br>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="Female">Female</label>
        </form>

    <h3> Numeric Field:</h3>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age">

    <h3> Checkboxes:</h3>
        <p>Hobbies:</p>
            <input type="checkbox" id="gaming" name="hobby" value="gaming">
            <label for="gaming">Gaming</label><br>

            <input type="checkbox" id="sports" name="hobby" value="Sports">
            <label for="sports">Sports</label><br>

            <input type="checkbox" id="music" name="hobby" value="Music">
            <label for="music">Music</label>

    <h2> 4) Question 4 (Label and Placeholder)</h2>
        <p>Label:</p>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username">

        <p>Placeholder:</p>
        <label for="number">Number:</label>
        <input type="number" placeholder="Enter your number">

    <h2> 6) Question 6 (Validation)</h2>
        <form action="redirect.html">
            <label for="name">Username:</label>
            <input type="text" id="name" name="username" required><br>

            <label for="email">Email  :</label>
            <input type="email" id="email" name="email" required><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>

            <input type="submit" value="SignUp">
        </form>
                    



    




</body>
</html>
