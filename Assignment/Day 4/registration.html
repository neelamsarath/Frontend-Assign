<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="text-align: center;padding: 10px;background-color: antiquewhite;">
    <h2>Registration Form</Form></h2>

    <form action="redirect.html">

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required><br><br>

        <label for="email">Email  :</label>
        <input type="email" id="email" name="email" placeholder="Enter email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter age" min="1" max="100" required><br><br>

        <label for="gender">Gender:</label>

            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label><br><br>
            


        <label>Hobbies :</label>

            <input type="checkbox" id="gaming" name="hobby" value="gaming">
            <label for="gaming">Gaming</label>

            <input type="checkbox" id="sports" name="hobby" value="Sports">
            <label for="sports">Sports</label>

            <input type="checkbox" id="music" name="hobby" value="Music">
            <label for="music">Music</label><br><br>

        <input type="submit" value="Login">
    </form>
    </div>
</body>
</html>
